name: Deploy webapp (EC2 via SSM)

# Redeploys the FastAPI admin webapp on the EC2 instance without opening SSH:
# it authenticates via OIDC, finds the instance by its Name tag, and uses AWS
# Systems Manager Run Command to run webscraper/deploy/remote_update.sh on the
# box (git pull + docker compose up -d --build — the same steps you run by hand).
# The instance builds the image locally, exactly as it already does.
#
# Prereqs (one-time), see .github/DEPLOY_CICD.md:
#   - the instance role has AmazonSSMManagedInstanceCore attached,
#   - the OIDC deploy role can ec2:DescribeInstances + ssm:SendCommand/GetCommandInvocation,
#   - if the repo is private, the instance's clone can still authenticate to git.

on:
  push:
    branches: [main]
    paths:
      - "webscraper/webapp/**"
      - "webscraper/webscraper/**"
      - "webscraper/docker-compose.yml"
      - "webscraper/Dockerfile.webapp"
      - "webscraper/deploy/**"
      - "mlclassifier/**"
      - ".github/workflows/deploy-webapp.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  # The instance's Name tag (set by both the manual guide and Terraform).
  INSTANCE_TAG_NAME: webscraper-webapp
  # Optional override of the app dir on the instance (the one containing
  # docker-compose.yml). Leave the repo variable unset to auto-detect.
  WEBAPP_DIR: ${{ vars.WEBAPP_DIR }}

concurrency:
  group: deploy-webapp
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve instance id from tag
        run: |
          set -euo pipefail
          ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$INSTANCE_TAG_NAME" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text --region "$AWS_REGION")
          if [ -z "$ID" ] || [ "$ID" = "None" ]; then
            echo "::error::No running instance tagged Name=$INSTANCE_TAG_NAME in $AWS_REGION"
            exit 1
          fi
          FIRST=$(echo "$ID" | tr '\t' '\n' | head -n1)
          if [ "$FIRST" != "$ID" ]; then echo "::warning::multiple instances matched; using $FIRST"; fi
          echo "INSTANCE_ID=$FIRST" >> "$GITHUB_ENV"
          echo "Target instance: $FIRST"

      - name: Build the SSM command payload
        run: |
          set -euo pipefail
          # Prepend the optional dir override, then the checked-in deploy script.
          # No heredoc → no YAML/heredoc indentation traps.
          { echo "WEBAPP_DIR='${WEBAPP_DIR}'"; cat webscraper/deploy/remote_update.sh; } > remote.sh
          jq -n --rawfile s remote.sh '{commands: [$s]}' > ssm-params.json
          echo "----- remote.sh -----"; cat remote.sh

      - name: Trigger deploy via SSM Run Command
        run: |
          set -euo pipefail
          CID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "CI deploy ${{ github.sha }}" \
            --parameters file://ssm-params.json \
            --cloud-watch-output-config CloudWatchOutputEnabled=true \
            --query "Command.CommandId" --output text --region "$AWS_REGION")
          echo "SSM command: $CID"

          # Poll to completion.
          STATUS=Pending
          for i in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CID" --instance-id "$INSTANCE_ID" \
              --query "Status" --output text --region "$AWS_REGION" 2>/dev/null || echo "Pending")
            echo "[$i] status=$STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut) break ;;
            esac
            sleep 10
          done

          echo "----- stdout -----"
          aws ssm get-command-invocation --command-id "$CID" --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text --region "$AWS_REGION" || true
          echo "----- stderr -----"
          aws ssm get-command-invocation --command-id "$CID" --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" --output text --region "$AWS_REGION" || true

          test "$STATUS" = "Success"
